version: '3.9'

services:
  app:
    build: .
    container_name: retail_pos_backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  mongo:
    image: mongo:7
    container_name: retail_pos_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: retail_pos_redis
    ports:
      - "6379:6379"

volumes:
  mongo_data:
